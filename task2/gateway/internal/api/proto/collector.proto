syntax = "proto3";

import "google/protobuf/timestamp.proto";

package collector;

option go_package = "github.com/IliaSotnikov2005/golang-course/task2/api/proto/gen;collectorpb";

// GetRepositoryRequest contains parameters for requesting repository information.
message GetRepositoryRequest {
    // owner - repository owner name.
    string owner = 1;

    // repo - repository name.
    string repo = 2;
}

// RepositoryInfo represents GitHub repository information.
message GetRepositoryResponse {
    // name - repository name.
    string name = 1;

    // description - repository description.
    string description = 2;
    
    // stargazers - number of stars the repository has.
    int32 stargazers = 3;
	
    // forks - number of repository forks.
    int32 forks = 4;
	
    // created_at - repository creation timestamp.
    google.protobuf.Timestamp created_at = 5;
	
    // html_url - repository URL on GitHub.
    string html_url = 6;
}

// CollectorService provides methods to retrieve information about GitHub repositories.
service CollectorService {
    
    // GetRepository fetches information about a repository by owner and name.
    //
    // Example request:
    //   {
    //     "owner": "golang",
    //     "repo": "go"
    //   }
    //
    // Example success response:
    //   {
    //     "name": "go",
    //     "description": "The Go programming language",
    //     "stargazers_count": 123456,
    //     "forks_count": 12345,
    //     "created_at": "2014-08-19T22:33:41Z",
    //     "html_url": "https://github.com/golang/go"
    //   }
    //
    // Errors:
    //   - NotFound: repository does not exist
    //   - InvalidArgument: invalid request parameters
    //   - Internal: internal server error
    //   - Unavailable: GitHub API is temporarily unavailable
    rpc GetRepository(GetRepositoryRequest) returns (GetRepositoryResponse);
}