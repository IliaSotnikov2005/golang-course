version: '3.8'

services:
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: github-collector
    ports:
      - "50505:50505"
    environment:
      - CONFIG_PATH=/app/configs/collector/config.yaml
    networks:
      - github-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpcurl", "-plaintext", "localhost:50051", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: github-gateway
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/configs/gateway/config.yaml
    networks:
      - github-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  github-network:
    driver: bridge